name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request. Please:
            1. Analyze the proposed changes
            2. Identify any bugs, security issues, or code quality concerns
            3. Assess the impact of the modifications
            4. Post a detailed review with actionable feedback
